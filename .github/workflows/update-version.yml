name: Autoupdate Warp
on:
  schedule:
    - cron: '0 */6 * * *' # Automated check every 6 hours
  workflow_dispatch:      # Allows manual trigger via GitHub UI
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  update-formula:
    runs-on: ubuntu-latest
    concurrency:
      group: update-warp-formula
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Fetch Latest Warp Release Metadata
        id: warp_data
        run: |
          set -euo pipefail

          # 1. Deterministic JSON parsing for version
          VERSION=$(curl -fsSL https://releases.warp.dev/channel_versions.json | jq -r '.stable.version')

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Error: Could not parse version from JSON endpoint"
            exit 1
          fi

          # 2. Build the target URL
          URL="https://releases.warp.dev/stable/${VERSION}/Warp-x86_64.AppImage"

          # 3. Validate URL resolves before streaming
          HTTP_STATUS=$(curl -o /dev/null -sIw "%{http_code}" "$URL")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Error: AppImage URL returned HTTP $HTTP_STATUS"
            exit 1
          fi

          # 4. Calculate SHA256 (streaming to avoid large disk usage)
          echo "Processing version: $VERSION"
          SHA256=$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')

          if [ -z "$SHA256" ]; then
            echo "Error: SHA256 calculation failed"
            exit 1
          fi

          # 5. Pass variables to subsequent steps
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Update Formula and README
        run: |
          # Update URL line in Formula
          sed -i "s|url \"https://releases.warp.dev/stable/.*\"|url \"${{ steps.warp_data.outputs.url }}\"|g" Formula/warp-terminal.rb

          # Update SHA256 line targeting the anchor comment
          sed -i "s|sha256 \".*\" # x86_64_placeholder|sha256 \"${{ steps.warp_data.outputs.sha256 }}\" # x86_64_placeholder|g" Formula/warp-terminal.rb

          # Inject Secrets/Context into README placeholders
          sed -i "s/GH_USER_PLACEHOLDER/${{ github.repository_owner }}/g" README.md
          sed -i "s/GIST_ID_PLACEHOLDER/${{ secrets.GIST_ID }}/g" README.md

      - name: Open Pull Request with Changes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/auto-update-warp
          commit-message: "chore(automation): bump warp to ${{ steps.warp_data.outputs.version }}"
          title: "chore(automation): bump warp to ${{ steps.warp_data.outputs.version }}"
          body: |
            Automated version bump by GitHub Actions.
            - **Version:** `${{ steps.warp_data.outputs.version }}`
            - **URL:** `${{ steps.warp_data.outputs.url }}`
            - **SHA256:** `${{ steps.warp_data.outputs.sha256 }}`
          labels: automation
          delete-branch: true

      - name: Update Version Badge (BYOB)
        uses: RubbaBoy/BYOB@v1.3.0
        with:
          NAME: warp-linux
          LABEL: "Warp Linux"
          STATUS: ${{ steps.warp_data.outputs.version }}
          COLOR: 446ca3
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
