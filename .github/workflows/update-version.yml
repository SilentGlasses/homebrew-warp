name: Autoupdate Warp

on:
  schedule:
    - cron: "0 */6 * * *" # Check every 6 hours
  workflow_dispatch: # Allow manual trigger from GitHub UI
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ────────────────────────────────────────────────
      # 1. Checkout
      # ────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ────────────────────────────────────────────────
      # 2. Resolve latest stable version from Warp's API
      #    JSON shape: { "stable": { "version": "v0.YYYY..." } }
      # ────────────────────────────────────────────────
      - name: Fetch Latest Warp Version
        id: warp_version
        run: |
          API_URL="https://releases.warp.dev/channel_versions.json"
          VERSION=$(curl -fsSL "$API_URL" | jq -r '.stable.version')

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not parse stable version from $API_URL"
            exit 1
          fi

          echo "Latest stable version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────
      # 3. Detect whether the formula already uses this version
      #    (avoids re-downloading ~200 MB of AppImages on no-op runs)
      # ────────────────────────────────────────────────
      - name: Check if Update is Needed
        id: check
        run: |
          VERSION="${{ steps.warp_version.outputs.version }}"
          CURRENT=$(grep -oP '(?<=stable/)v[^/]+(?=/Warp-)' Formula/warp-terminal.rb | head -1 || true)

          echo "Current formula version : ${CURRENT:-unknown}"
          echo "Latest upstream version : $VERSION"

          if [ "$CURRENT" = "$VERSION" ]; then
            echo "Formula is already up to date."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update required."
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      # ────────────────────────────────────────────────
      # 4. Download both AppImages and compute SHA256
      #    (only when an update is actually needed)
      # ────────────────────────────────────────────────
      - name: Fetch AppImages and Compute SHA256
        id: warp_data
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.warp_version.outputs.version }}"
          BASE_URL="https://releases.warp.dev/stable/${VERSION}"
          URL_X86="${BASE_URL}/Warp-x86_64.AppImage"
          URL_ARM="${BASE_URL}/Warp-aarch64.AppImage"

          echo "Downloading x86_64 AppImage..."
          SHA256_X86=$(curl -fsSL "$URL_X86" | sha256sum | awk '{print $1}')
          [ -z "$SHA256_X86" ] && { echo "::error::SHA256 failed for x86_64"; exit 1; }

          echo "Downloading aarch64 AppImage..."
          SHA256_ARM=$(curl -fsSL "$URL_ARM" | sha256sum | awk '{print $1}')
          [ -z "$SHA256_ARM" ] && { echo "::error::SHA256 failed for aarch64"; exit 1; }

          echo "x86_64  sha256: $SHA256_X86"
          echo "aarch64 sha256: $SHA256_ARM"

          {
            echo "sha256_x86=$SHA256_X86"
            echo "sha256_arm=$SHA256_ARM"
            echo "url_x86=$URL_X86"
            echo "url_arm=$URL_ARM"
          } >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────
      # 5. Patch the formula (anchor-comment targeting)
      #    Each sed targets a unique trailing comment so
      #    the two url lines and two sha256 lines are
      #    updated independently and correctly.
      # ────────────────────────────────────────────────
      - name: Update Formula
        if: steps.check.outputs.needs_update == 'true'
        run: |
          X86_URL="${{ steps.warp_data.outputs.url_x86 }}"
          ARM_URL="${{ steps.warp_data.outputs.url_arm }}"
          X86_SHA="${{ steps.warp_data.outputs.sha256_x86 }}"
          ARM_SHA="${{ steps.warp_data.outputs.sha256_arm }}"

          sed -i "s|url \".*\" # x86_64_url|url \"${X86_URL}\" # x86_64_url|" Formula/warp-terminal.rb
          sed -i "s|sha256 \".*\" # x86_64_sha256|sha256 \"${X86_SHA}\" # x86_64_sha256|" Formula/warp-terminal.rb
          sed -i "s|url \".*\" # arm64_url|url \"${ARM_URL}\" # arm64_url|" Formula/warp-terminal.rb
          sed -i "s|sha256 \".*\" # arm64_sha256|sha256 \"${ARM_SHA}\" # arm64_sha256|" Formula/warp-terminal.rb

          echo "Formula patched. Diff:"
          git diff Formula/warp-terminal.rb

      # ────────────────────────────────────────────────
      # 6. Update README placeholders (idempotent)
      # ────────────────────────────────────────────────
      - name: Update README
        if: steps.check.outputs.needs_update == 'true'
        run: |
          sed -i "s/GH_USER_PLACEHOLDER/${{ github.repository_owner }}/g" README.md
          sed -i "s/GIST_ID_PLACEHOLDER/${{ secrets.GIST_ID }}/g" README.md

      # ────────────────────────────────────────────────
      # 7. Commit to a feature branch and open a PR
      #    Direct pushes to main are blocked by branch
      #    protection, so changes go through a PR instead.
      #    If a PR for this version already exists it will
      #    not be duplicated (gh pr list check is idempotent).
      # ────────────────────────────────────────────────
      - name: Commit and Push to Feature Branch
        if: steps.check.outputs.needs_update == 'true'
        id: git_push
        run: |
          VERSION="${{ steps.warp_version.outputs.version }}"
          BRANCH="chore/bump-warp-${VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add Formula/warp-terminal.rb README.md
          git commit -m "chore(automation): bump warp to ${VERSION}"
          git push --force-with-lease origin "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open Pull Request
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.warp_version.outputs.version }}"
          BRANCH="${{ steps.git_push.outputs.branch }}"

          # Check if a PR already exists for this branch; skip if so.
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists for branch ${BRANCH} — skipping."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(automation): bump warp to ${VERSION}" \
              --body "Automated version bump to \`${VERSION}\`.

          **Changes:**
          - Updated x86_64 URL and SHA256
          - Updated aarch64 URL and SHA256

          > Opened automatically by the Autoupdate Warp workflow."
          fi

      # ────────────────────────────────────────────────
      # 8. Update the version badge via BYOB
      #    v1.3.0 stores badge JSON in a repo branch,
      #    not a Gist. Inputs: name, label, status,
      #    color, github_token, path, branch, repository.
      # ────────────────────────────────────────────────
      - name: Update Version Badge
        if: steps.check.outputs.needs_update == 'true'
        uses: RubbaBoy/BYOB@v1.3.0
        with:
          name: warp-version
          label: "Warp Linux"
          status: ${{ steps.warp_version.outputs.version }}
          color: "01e6ca"
          github_token: ${{ secrets.GITHUB_TOKEN }}
