name: Autoupdate Warp
on:
  schedule:
    - cron: '0 */6 * * *' # Automated check every 6 hours
  workflow_dispatch:      # Allows manual trigger via GitHub UI
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch Latest Warp Release Metadata
        id: warp_data
        run: |
          # 1. Deterministic JSON parsing for version
          VERSION=$(curl -fsSL https://releases.warp.dev/channel_versions.json | jq -r '.stable.version')

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Error: Could not parse version from JSON endpoint"
            exit 1
          fi

          # 2. Build the target URL
          URL="https://releases.warp.dev/stable/${VERSION}/Warp-x86_64.AppImage"

          # 3. Calculate SHA256 (streaming to avoid large disk usage)
          echo "Processing version: $VERSION"
          SHA256=$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')

          if [ -z "$SHA256" ]; then
            echo "Error: SHA256 calculation failed"
            exit 1
          fi

          # 4. Pass variables to subsequent steps
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Update Formula and README
        run: |
          # Update URL line in Formula
          sed -i "s|url \"https://releases.warp.dev/stable/.*\"|url \"${{ steps.warp_data.outputs.url }}\"|g" Formula/warp-terminal.rb

          # Update SHA256 line targeting the anchor comment
          sed -i "s|sha256 \".*\" # x86_64_placeholder|sha256 \"${{ steps.warp_data.outputs.sha256 }}\" # x86_64_placeholder|g" Formula/warp-terminal.rb

          # Inject Secrets/Context into README placeholders
          sed -i "s/GH_USER_PLACEHOLDER/${{ github.repository_owner }}/g" README.md
          sed -i "s/GIST_ID_PLACEHOLDER/${{ secrets.GIST_ID }}/g" README.md

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(automation): bump warp to ${{ steps.warp_data.outputs.version }}"
          file_pattern: 'Formula/*.rb README.md'

      - name: Update Version Badge (BYOB)
        uses: RubbaBoy/BYOB@v1.3.0
        with:
          file: warp-version.json
          gist-id: ${{ secrets.GIST_ID }}
          gist-token: ${{ secrets.GIST_TOKEN }}
          message: ${{ steps.warp_data.outputs.version }}
          label: "Warp Linux"
          color: "01e6ca"
          repository: ${{ github.repository }}
