name: Test Formula

on:
  push:
    branches: [main]
    paths:
      - "Formula/**"
  pull_request:
    branches: [main]
    paths:
      - "Formula/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Audit formula
        run: brew audit --strict Formula/warp-terminal.rb

      - name: Install formula
        run: brew install --verbose Formula/warp-terminal.rb

      - name: Run formula tests
        run: brew test Formula/warp-terminal.rb
