name: Test Formula

on:
  push:
    branches: [main]
    paths:
      - "Formula/**"
  pull_request:
    branches: [main]
    paths:
      - "Formula/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Check Ruby syntax
        run: ruby -c Formula/warp-terminal.rb

      - name: Audit formula
        run: brew audit silentglasses/warp/warp-terminal

      - name: Validate formula loads without errors
        run: brew readall --tap silentglasses/warp
